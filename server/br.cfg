// bool:    1 = true, 0 = false
// int:     whole number, e.g.: 5
// float:   int or decimal number, e.g.: 5 or 5.5
// string:  text, e.g.: "abc123"

// If leaving below cvars blank, the default values hardcoded in br.gsc will be used.

// [float] Seconds required to open a crate.
set br_crateOpeningDuration ""

// [string] The dir path for the stats DB, there is no default.
set br_dbDirPath ""

// [bool] Display hitmarker when hitting enemy.
set br_hitmarker ""

// [bool] Kill with a single hit.
set br_instantkill_bolt ""
set br_instantkill_melee ""
set br_instantkill_pistol ""

// [int] Required players count before starting battle.
set br_minPlayers ""

// [int] Amount of bots to spawn for debugging.
set br_numBots ""

// [float] Required seconds between voice messages.
set br_quickChatDelay ""

// [int] Seconds before starting battle.
set br_startBattleCountdown ""

// [int] Seconds before shrinking zone.
set br_staticZoneDuration ""